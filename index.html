<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SwipeLearn AI - Learn Anything</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0f0f13; }
    #root { height: 100%; }
    .suggestion { transition: all 0.15s; cursor: pointer; }
    .suggestion:hover { background: rgba(255,255,255,0.12) !important; color: #fff !important; }
    .gen-btn { transition: all 0.15s; cursor: pointer; }
    .gen-btn:hover:not(:disabled) { opacity: 0.85 !important; }
    .gen-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn { transition: all 0.15s; cursor: pointer; border: none; }
    .nav-btn:hover:not(:disabled) { opacity: 0.8; }
    .nav-btn:disabled { opacity: 0.15; cursor: not-allowed; }
    .back-link { cursor: pointer; transition: opacity 0.15s; border: none; background: none; }
    .back-link:hover { opacity: 0.5; }
    .count-btn { transition: all 0.15s; cursor: pointer; border: none; }
    .count-btn:hover { opacity: 0.8; }
    input { caret-color: #a78bfa; }
    input:focus { outline: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.08); opacity: 1; } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .gradient-text {
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399, #a78bfa);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // YOUR WORKER URL
    const API_URL = "https://swipelearn.ssaketh517.workers.dev/";

    const SUGGESTIONS = [
      "How UPI works", "Current war in Gaza", "Black Holes",
      "How Netflix makes money", "Stoicism", "India's space program",
      "Russia-Ukraine war", "How does ChatGPT work"
    ];

    const CARD_OPTIONS = [3, 4, 5, 6, 7, 8];

    const GRADIENTS = [
      "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
      "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)",
      "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
      "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)",
      "linear-gradient(135deg, #fa709a 0%, #fee140 100%)",
    ];

    const tagColors = {
      "geopolitics": "#ef4444", "politics": "#ef4444", "war": "#ef4444", "conflict": "#ef4444",
      "finance": "#10b981", "economics": "#10b981", "business": "#f59e0b",
      "science": "#3b82f6", "space": "#8b5cf6", "tech": "#06b6d4", "ai": "#06b6d4",
      "psychology": "#ec4899", "philosophy": "#ec4899", "history": "#d97706", 
      "health": "#22c55e", "culture": "#f97316", "sports": "#16a34a", "default": "#6366f1"
    };

    function getTagColor(tag) {
      if (!tag) return tagColors.default;
      const lower = tag.toLowerCase();
      for (const key of Object.keys(tagColors)) {
        if (lower.includes(key)) return tagColors[key];
      }
      return tagColors.default;
    }

    async function generateWithAI(topic, count) {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic, count })
      });

      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.error || "API request failed");
      }

      return await response.json();
    }

    function App() {
      const [screen, setScreen] = useState("home");
      const [input, setInput] = useState("");
      const [cardCount, setCardCount] = useState(5);
      const [cards, setCards] = useState([]);
      const [topicName, setTopicName] = useState("");
      const [currentIndex, setCurrentIndex] = useState(0);
      const [animDir, setAnimDir] = useState(null);
      const [animating, setAnimating] = useState(false);
      const [error, setError] = useState(null);
      const [endInput, setEndInput] = useState("");
      const [bgGradient] = useState(() => GRADIENTS[Math.floor(Math.random() * GRADIENTS.length)]);
      const touchStart = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        if (screen === "home") setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
      }, [screen]);

      async function generate(topic, count) {
        const n = count !== undefined ? count : cardCount;
        if (!topic.trim()) return;
        setError(null);
        setScreen("loading");

        try {
          const parsed = await generateWithAI(topic, n);
          
          if (!parsed.cards || parsed.cards.length === 0) {
            throw new Error("No cards generated");
          }
          
          setCards(parsed.cards);
          setTopicName(parsed.topic || topic);
          setCurrentIndex(0);
          setScreen("reels");

        } catch (err) {
          console.error(err);
          setError(err.message || "Something went wrong. Try again.");
          setScreen("home");
        }
      }

      function goNext() {
        if (animating) return;
        if (currentIndex >= cards.length - 1) { setScreen("end"); return; }
        setAnimDir("up");
        setAnimating(true);
        setTimeout(() => { setCurrentIndex(i => i + 1); setAnimDir(null); setAnimating(false); }, 260);
      }

      function goPrev() {
        if (animating || currentIndex <= 0) return;
        setAnimDir("down");
        setAnimating(true);
        setTimeout(() => { setCurrentIndex(i => i - 1); setAnimDir(null); setAnimating(false); }, 260);
      }

      function handleTouchStart(e) { touchStart.current = e.touches[0].clientY; }
      function handleTouchEnd(e) {
        if (!touchStart.current) return;
        const diff = touchStart.current - e.changedTouches[0].clientY;
        if (diff > 45) goNext();
        else if (diff < -45) goPrev();
        touchStart.current = null;
      }

      const currentCard = cards[currentIndex];
      const tagColor = currentCard ? getTagColor(currentCard.tag) : tagColors.default;

      const cardAnim = {
        transform: animating ? (animDir === "up" ? "translateY(-45px)" : "translateY(45px)") : "translateY(0)",
        opacity: animating ? 0 : 1,
        transition: "transform 0.26s cubic-bezier(0.4,0,0.2,1), opacity 0.26s ease",
      };

      return (
        <div style={{ minHeight: "100vh", background: "#0f0f13", display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto" }}>

          {/* HOME */}
          {screen === "home" && (
            <div className="fade-in" style={{ flex: 1, display: "flex", flexDirection: "column", padding: "52px 22px 36px" }}>
              <div style={{ marginBottom: 36 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <h1 className="gradient-text" style={{ fontFamily: "'Syne', sans-serif", fontSize: 44, fontWeight: 800, letterSpacing: "-2px", lineHeight: 1 }}>
                    SwipeLearn
                  </h1>
                  <span style={{ fontFamily: "'Outfit', sans-serif", fontSize: 10, fontWeight: 700, letterSpacing: "0.15em", color: "#0f0f13", background: "linear-gradient(135deg, #a78bfa, #60a5fa)", padding: "4px 9px", borderRadius: 6, textTransform: "uppercase" }}>
                    AI
                  </span>
                </div>
                <p style={{ fontFamily: "'Outfit', sans-serif", fontSize: 12, color: "rgba(255,255,255,0.3)", marginTop: 8 }}>
                  Free AI • Swipe up to learn anything
                </p>
              </div>

              <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 18, border: "1.5px solid rgba(255,255,255,0.1)", padding: "4px 4px 4px 18px", display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <input
                  ref={inputRef}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && generate(input)}
                  placeholder="Ask about anything... (wars, science, history)"
                  style={{ flex: 1, border: "none", background: "none", fontFamily: "'Outfit', sans-serif", fontSize: 15, color: "#fff", fontWeight: 400, padding: "13px 0" }}
                />
                <button
                  className="gen-btn"
                  onClick={() => generate(input)}
                  disabled={!input.trim()}
                  style={{ background: "linear-gradient(135deg, #a78bfa, #60a5fa)", color: "#fff", border: "none", borderRadius: 14, padding: "12px 18px", fontFamily: "'Outfit', sans-serif", fontSize: 13, fontWeight: 700 }}
                >
                  Go →
                </button>
              </div>

              {error && <p style={{ fontFamily: "'Outfit', sans-serif", fontSize: 12, color: "#f87171", marginBottom: 10, paddingLeft: 2 }}>{error}</p>}

              <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", marginBottom: 28, background: "rgba(255,255,255,0.03)", borderRadius: 14, border: "1px solid rgba(255,255,255,0.07)" }}>
                <span style={{ fontFamily: "'Outfit', sans-serif", fontSize: 12, color: "rgba(255,255,255,0.4)", fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.08em", whiteSpace: "nowrap" }}>
                  Cards
                </span>
                <div style={{ display: "flex", gap: 6 }}>
                  {CARD_OPTIONS.map(n => (
                    <button
                      key={n}
                      className="count-btn"
                      onClick={() => setCardCount(n)}
                      style={{ width: 32, height: 32, borderRadius: 8, fontFamily: "'Outfit', sans-serif", fontSize: 13, fontWeight: 600, background: cardCount === n ? "linear-gradient(135deg, #a78bfa, #60a5fa)" : "rgba(255,255,255,0.07)", color: cardCount === n ? "#fff" : "rgba(255,255,255,0.45)", boxShadow: cardCount === n ? "0 2px 12px rgba(167,139,250,0.4)" : "none" }}
                    >
                      {n}
                    </button>
                  ))}
                </div>
              </div>

              <p style={{ fontFamily: "'Outfit', sans-serif", fontSize: 11, color: "rgba(255,255,255,0.25)", fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 10 }}>
                Try these
              </p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {SUGGESTIONS.map(s => (
                  <button key={s} className="suggestion" onClick={() => { setInput(s); generate(s); }}
                    style={{ fontFamily: "'Outfit', sans-serif", fontSize: 13, fontWeight: 400, color: "rgba(255,255,255,0.6)", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 99, padding: "8px 14px", cursor: "pointer" }}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* LOADING */}
          {screen === "loading" && (
            <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 28 }}>
              <div style={{ position: "relative", width: 80, height: 80 }}>
                <div style={{ position: "absolute", inset: 0, borderRadius: "50%", background: bgGradient, animation: "pulse-ring 1.5s ease infinite", filter: "blur(2px)" }} />
                <div style={{ position: "absolute", inset: 6, borderRadius: "50%", background: "#0f0f13", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <div style={{ width: 28, height: 28, borderRadius: "50%", border: "2.5px solid transparent", borderTopColor: "#a78bfa", borderRightColor: "#60a5fa", animation: "spin 0.7s linear infinite" }} />
                </div>
              </div>
              <div style={{ textAlign: "center" }}>
                <p style={{ fontFamily: "'Syne', sans-serif", fontSize: 22, fontWeight: 700, color: "#fff", letterSpacing: "-0.3px" }}>Generating</p>
                <p style={{ fontFamily: "'Outfit', sans-serif", fontSize: 13, color: "rgba(255,255,255,0.35)", fontWeight: 300, marginTop: 5 }}>AI creating {cardCount} cards...</p>
              </div>
            </div>
          )}

          {/* REELS */}
          {screen === "reels" && currentCard && (
            <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "24px 20px 24px" }}
              onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>

              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                <button className="back-link" onClick={() => setScreen("home")} style={{ fontFamily: "'Outfit', sans-serif", fontSize: 13, color: "rgba(255,255,255,0.35)", fontWeight: 400 }}>
                  ← New topic
                </button>
                <span style={{ fontFamily: "'Outfit', sans-serif", fontSize: 12, color: "rgba(255,255,255,0.3)" }}>{currentIndex + 1} / {cards.length}</span>
              </div>

              <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
                {cards.map((_, i) => (
                  <div key={i} style={{ flex: 1, height: 3, borderRadius: 99, background: i <= currentIndex ? "linear-gradient(90deg, #a78bfa, #60a5fa)" : "rgba(255,255,255,0.08)", transition: "background 0.3s ease" }} />
                ))}
              </div>

              <p style={{ fontFamily: "'Outfit', sans-serif", fontSize: 10, color: "rgba(255,255,255,0.25)", fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>
                {topicName}
              </p>

              <div style={{ flex: 1, ...cardAnim }}>
                <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 24, padding: "26px 22px", border: "1px solid rgba(255,255,255,0.08)", minHeight: 320, display: "flex", flexDirection: "column", gap: 16, boxShadow: "0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08)" }}>
                  <div style={{ display: "inline-flex", alignSelf: "flex-start", background: tagColor + "22", color: tagColor, fontFamily: "'Outfit', sans-serif", fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", padding: "5px 12px", borderRadius: 99, border: `1px solid ${tagColor}35` }}>
                    {currentCard.tag}
                  </div>
                  <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, fontWeight: 700, color: "#fff", lineHeight: 1.2, letterSpacing: "-0.2px" }}>
                    {currentCard.title}
                  </h2>
                  <div style={{ background: tagColor + "12", borderLeft: `3px solid ${tagColor}`, borderRadius: "0 12px 12px 0", padding: "12px 14px" }}>
                    <p style={{ fontFamily: "'Outfit', sans-serif", fontSize: 13, fontWeight: 500, color: "rgba(255,255,255,0.75)", lineHeight: 1.6, fontStyle: "italic" }}>
                      "{currentCard.fact}"
                    </p>
                  </div>
                  <p style={{ fontFamily: "'Outfit', sans-serif", fontSize: 14, color: "rgba(255,255,255,0.55)", lineHeight: 1.75, fontWeight: 300, flex: 1 }}>
                    {currentCard.body}
                  </p>
                  <p style={{ fontFamily: "'Outfit', sans-serif", fontSize: 9, color: "rgba(255,255,255,0.2)", marginTop: 8, textAlign: "center" }}>
                    🤖 AI-generated • Verify important facts
                  </p>
                </div>
              </div>

              <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
                <button className="nav-btn" onClick={goPrev} disabled={currentIndex === 0}
                  style={{ flex: 1, padding: "13px", borderRadius: 14, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", fontFamily: "'Outfit', sans-serif", fontSize: 14, color: "rgba(255,255,255,0.5)", fontWeight: 500 }}>
                  ↑ Prev
                </button>
                <button className="nav-btn" onClick={goNext}
                  style={{ flex: 2, padding: "13px", borderRadius: 14, background: "linear-gradient(135deg, #a78bfa, #60a5fa)", border: "none", fontFamily: "'Outfit', sans-serif", fontSize: 14, color: "#fff", fontWeight: 700 }}>
                  {currentIndex === cards.length - 1 ? "Finish ✓" : "Next ↓"}
                </button>
              </div>
            </div>
          )}

          {/* END */}
          {screen === "end" && (
            <div className="fade-in" style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 22px", textAlign: "center", gap: 8 }}>
              <div style={{ width: 60, height: 60, borderRadius: "50%", background: bgGradient, marginBottom: 14, boxShadow: "0 0 40px rgba(167,139,250,0.35)" }} />
              <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 28, fontWeight: 800, color: "#fff", letterSpacing: "-0.5px", marginBottom: 4 }}>
                That's a wrap.
              </h2>
              <p style={{ fontFamily: "'Outfit', sans-serif", fontSize: 14, color: "rgba(255,255,255,0.4)", fontWeight: 300, marginBottom: 28, lineHeight: 1.6 }}>
                You just learned about<br />
                <span style={{ color: "#fff", fontWeight: 600 }}>{topicName}</span>
              </p>
              <div style={{ width: "100%", background: "rgba(255,255,255,0.06)", borderRadius: 16, border: "1px solid rgba(255,255,255,0.1)", padding: "4px 4px 4px 16px", display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                <input
                  value={endInput}
                  onChange={e => setEndInput(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") { generate(endInput); setEndInput(""); } }}
                  placeholder="What's next?"
                  style={{ flex: 1, border: "none", background: "none", fontFamily: "'Outfit', sans-serif", fontSize: 15, color: "#fff", fontWeight: 400, padding: "12px 0" }}
                />
                <button className="gen-btn" onClick={() => { generate(endInput); setEndInput(""); }} disabled={!endInput.trim()}
                  style={{ background: "linear-gradient(135deg, #a78bfa, #60a5fa)", color: "#fff", border: "none", borderRadius: 12, padding: "11px 16px", fontFamily: "'Outfit', sans-serif", fontSize: 13, fontWeight: 700 }}>
                  Go →
                </button>
              </div>
              <button className="back-link" onClick={() => setScreen("home")} style={{ fontFamily: "'Outfit', sans-serif", fontSize: 13, color: "rgba(255,255,255,0.25)", fontWeight: 400 }}>
                Back to home
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
