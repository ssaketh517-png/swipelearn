<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SwipeLearn AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f13; font-family: system-ui, -apple-system, sans-serif; }
    #root { max-width: 480px; margin: 0 auto; padding: 20px; }
    input, button { padding: 12px 16px; font-size: 16px; border-radius: 12px; }
    input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; }
    button { background: #a78bfa; border: none; color: white; font-weight: bold; cursor: pointer; }
    .card { background: rgba(255,255,255,0.05); border-radius: 24px; padding: 24px; margin: 16px 0; }
  </style>
</head>
<body>
  <div id="root">
    <h1 style="color: white; font-size: 44px; margin-bottom: 20px;">SwipeLearn AI</h1>
    <input type="text" id="topic" placeholder="Ask anything..." style="width: 70%;">
    <button onclick="generate()" style="width: 28%;">Go</button>
    <div id="loading" style="display: none; color: white; margin-top: 20px;">Loading...</div>
    <div id="result"></div>
  </div>

  <script>
    const API_URL = "https://swipelearn.ssaketh517.workers.dev";

    async function generate() {
      const topic = document.getElementById("topic").value;
      if (!topic) return;
      
      document.getElementById("loading").style.display = "block";
      document.getElementById("result").innerHTML = "";
      
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic: topic, count: 3 })
        });
        
        const data = await response.json();
        document.getElementById("loading").style.display = "none";
        
        let html = "";
        if (data.cards) {
          data.cards.forEach(card => {
            html += `<div class="card">
              <div style="color: #a78bfa; font-size: 12px;">${card.tag || "Learning"}</div>
              <h2 style="color: white; margin: 10px 0;">${card.title}</h2>
              <p style="color: #ccc; font-style: italic;">"${card.fact}"</p>
              <p style="color: #999; margin-top: 10px;">${card.body}</p>
            </div>`;
          });
        } else {
          html = `<div class="card"><p style="color: white;">No cards generated. Try again.</p></div>`;
        }
        document.getElementById("result").innerHTML = html;
        
      } catch (err) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("result").innerHTML = `<div class="card"><p style="color: red;">Error: ${err.message}</p></div>`;
      }
    }
  </script>
</body>
</html>
